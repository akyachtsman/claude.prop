# qa-response.yml — Event-driven QA triggered by repository_dispatch.
# Copy to .github/workflows/qa-response.yml in your project.
# Triggers on qa-email-received, test-failure-reported, or manual-qa-trigger events.
# Active sessions receive results and act autonomously without human intervention.
#
# Dispatch this workflow from a Claude Code session using the GitHub API:
#   curl -X POST https://api.github.com/repos/<owner>/<repo>/dispatches \
#     -H "Authorization: token <GITHUB_TOKEN>" \
#     -d '{"event_type":"manual-qa-trigger"}'
#
# Required setup:
#   - Add TEST_AUTH_CREDENTIAL as a repository secret (value from CLAUDE.md)
#   - Add APP_URL as a repository variable (live URL)
#   - Set UI_TESTS_DIR below to the path of your Playwright test directory

name: QA — Event-Driven Response

on:
  repository_dispatch:
    types:
      - qa-email-received       # triggered when Gmail monitor detects a relevant email
      - test-failure-reported   # triggered when another workflow reports a failure
      - manual-qa-trigger       # triggered manually by an active session

  # Also allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual session trigger'

# Least privilege: read the repo and run tests.
permissions:
  contents: read

env:
  UI_TESTS_DIR: .github/scripts/ui-tests

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Event data is passed through env, never interpolated directly into the
      # run: script — a repository_dispatch client_payload is attacker-influenceable,
      # and inlining `${{ github.event.* }}` into a shell body is a script-injection vector.
      - name: Log trigger reason
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "Trigger: $EVENT_NAME"
          echo "Event type: $EVENT_ACTION"
          echo "Payload: $CLIENT_PAYLOAD"

      - name: Secret scan
        uses: ./.github/actions/secret-scan

  ui-tests:
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: UI suite (live URL)
        uses: ./.github/actions/ui-suite
        with:
          tests-dir: ${{ env.UI_TESTS_DIR }}
          app-url: ${{ vars.APP_URL }}
          test-auth-credential: ${{ secrets.TEST_AUTH_CREDENTIAL }}
          artifact-name: playwright-results-response-${{ github.run_id }}

      # Results are available in the Actions tab for the active session to read
      # and act on via the GitHub MCP tools (pull_request_read, get_job_logs, etc.)
